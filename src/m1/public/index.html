<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planets</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  min-height: 100vh;
}
.header { text-align: center; padding: 2rem 1rem 1rem; }
.header h1 { font-size: 2rem; font-weight: 700; color: #fff; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem;
  padding: 1.5rem;
  max-width: 1200px;
  margin: 0 auto;
}
.card {
  background: #1a1a2e;
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.2s;
}
.card:hover { transform: translateY(-4px); }
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
}
.card-body { padding: 1rem; }
.card h2 { font-size: 1.25rem; margin-bottom: 0.5rem; color: #fff; }
.card .stat { font-size: 0.85rem; color: #9090b0; margin: 0.25rem 0; }
.card .stat strong { color: #c0c0e0; }
.rings-badge {
  display: inline-block;
  background: #c8a94e;
  color: #1a1a2e;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 0.5rem;
}
.rings-badge.none { background: #2a2a3e; color: #606080; }
.discovery { font-size: 0.8rem; color: #707090; margin-top: 0.5rem; font-style: italic; }
.loading { text-align: center; padding: 3rem; color: #606080; }
</style>
</head>
<body>
<div class="header"><h1>The Solar System</h1></div>
<div class="grid" id="grid"><div class="loading">Loading planets…</div></div>
<script>
fetch('/api/planets')
  .then(r => r.json())
  .then(planets => {
    document.getElementById('grid').innerHTML = planets.map(p => `
      <div class="card">
        <img src="${p.imgurl}" alt="${p.name}" loading="lazy"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%232a2a3e%22 width=%22100%22 height=%22100%22/><text fill=%22%23606080%22 x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2214%22>No Image</text></svg>'">
        <div class="card-body">
          <h2>${p.name}</h2>
          <div class="stat">Mass: <strong>${p.massearths} M⊕</strong></div>
          <div class="stat">Radius: <strong>${Number(p.radiuskm).toLocaleString()} km</strong></div>
          <div class="stat">Distance: <strong>${p.distanceau} AU</strong></div>
          <span class="rings-badge ${p.hasrings ? '' : 'none'}">${p.hasrings ? '🪐 Rings' : 'No Rings'}</span>
          ${p.discoveredby ? `<div class="discovery">Discovered by ${p.discoveredby} (${p.discoveryyear})</div>` : ''}
        </div>
      </div>
    `).join('');
  })
  .catch(() => {
    document.getElementById('grid').innerHTML = '<div class="loading">Failed to load planets. Is the API running?</div>';
  });
</script>
</body>
</html>

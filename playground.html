<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — DevOps Labs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
  <style>
    /* ── Layout shell ───────────────────────────────────────────────────── */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .playground-shell {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    #sidebar {
      width: 272px;
      min-width: 272px;
      background: #071336;
      border-right: 1px solid #1e2130;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
      padding: 1.25rem 0 2rem;
      scrollbar-width: thin;
      scrollbar-color: #2a2f45 transparent;
    }

    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: #2a2f45; border-radius: 2px; }

    .sidebar-group-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4a5070;
      padding: 1.1rem 1.25rem 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sidebar-module-btn {
      display: block;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 0.55rem 1.25rem 0.55rem 1.5rem;
      color: #8b92b0;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      line-height: 1.35;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .sidebar-module-btn:hover:not(.disabled) {
      color: #c8cde0;
      background: #161825;
    }

    .sidebar-module-btn.active {
      color: #e2e6f5;
      border-left-color: #5b8af5;
      background: #161e38;
      font-weight: 600;
    }

    .sidebar-module-btn.disabled {
      color: #363c55;
      cursor: default;
      font-style: italic;
    }

    .sidebar-module-subtitle {
      display: block;
      font-size: 0.72rem;
      color: #4a5070;
      margin-top: 0.15rem;
      font-weight: 400;
      font-style: normal;
    }

    .sidebar-module-btn.active .sidebar-module-subtitle {
      color: #6878a8;
    }

    /* ── Main content ───────────────────────────────────────────────────── */
    #playground-main {
      flex: 1;
      overflow-y: auto;
      padding: 2.5rem 2rem;
    }

    #playground-main .inner {
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Empty state ────────────────────────────────────────────────────── */
    #module-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: #4a5070;
      text-align: center;
      gap: 0.75rem;
    }

    #module-empty .empty-icon { font-size: 3rem; opacity: 0.4; }
    #module-empty h4 { font-size: 1rem; font-weight: 600; color: #6878a8; margin: 0; }
    #module-empty p  { font-size: 0.85rem; margin: 0; max-width: 280px; }

    /* ── Mobile toggle ──────────────────────────────────────────────────── */
    #sidebar-toggle { display: none; }

    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        top: 52px;
        left: -280px;
        height: calc(100vh - 52px);
        z-index: 200;
        transition: left 0.25s ease;
        width: 260px;
        min-width: 260px;
      }
      #sidebar.open {
        left: 0;
        box-shadow: 4px 0 24px rgba(0,0,0,0.5);
      }
      #sidebar-toggle { display: inline-flex; }
      #playground-main { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-dark bg-dark sticky-top shadow-sm" style="z-index: 300;">
  <div class="container-fluid px-3">
    <div class="d-flex align-items-center gap-2">
      <button id="sidebar-toggle" class="btn btn-sm btn-outline-secondary me-1" aria-label="Toggle sidebar">☰</button>
      <a class="navbar-brand fw-bold mb-0" href="index.html">
        <span style="font-family:'JetBrains Mono',monospace; font-size:0.95rem;">k3s-pi5</span>
      </a>
    </div>
    <div class="d-flex align-items-center gap-1">
      <a class="nav-link text-secondary px-2" href="index.html" style="font-size:0.88rem;">Commands</a>
      <span class="text-secondary" style="font-size:0.8rem;">|</span>
      <a class="nav-link text-white px-2 fw-semibold" href="playground.html" style="font-size:0.88rem;">🧪 Playground</a>
    </div>
  </div>
</nav>

<!-- ── App shell ───────────────────────────────────────────────────────────── -->
<div class="playground-shell">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-nav">
      <!-- Populated by playground.js -->
    </div>
  </nav>

  <!-- Main content -->
  <main id="playground-main">
    <div class="inner">

      <!-- Module header — shown after a module loads -->
      <div id="module-header" class="text-center mb-5" style="display:none;">
        <h1 class="fw-bold fs-2 mb-1" id="module-title"></h1>
        <p class="text-secondary mb-4" id="module-subtitle"></p>
        <input type="text" id="searchInput" class="form-control mb-3"
          placeholder="Search commands or concepts…" />
        <div id="filterControls" class="d-flex flex-wrap gap-2 justify-content-center"></div>
      </div>

      <!-- Command list (driven by app.js render()) -->
      <div id="commandList"></div>
      <div class="no-results text-center text-secondary py-5" id="noResults" style="display:none;">
        <p class="fs-5">No commands match your search.</p>
      </div>

      <!-- Empty state -->
      <div id="module-empty">
        <div class="empty-icon">🧪</div>
        <h4>Pick a module from the sidebar</h4>
        <p>Select a lab module on the left to explore its commands and explanations.</p>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="modules/m1-devops-intro.js"></script>
<script src="modules/m2-docker-intro.js"></script>
<!-- ...15 more files, same pattern -->
<script src="modules/registry.js"></script>
<script src="playground.js"></script>
<script src="index.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>k3s-pi5 Commands Explainer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
 
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container py-5" style="max-width: 860px;">

  <!-- Header -->
  <div class="text-center mb-5">
    <h1 class="fw-bold fs-2 mb-1">🐧 Linux Setup Command Explainer</h1>
    <p class="text-secondary mb-4">Click any command to break it down. Search or filter by category.</p>

    <!-- Search -->
    <input type="text" id="searchInput" class="form-control mb-3"
      placeholder="Search commands or concepts (e.g. 'sudo', 'kubernetes', 'firewall')" />

    <!-- Filter buttons -->
    <div id="filterControls" class="d-flex flex-wrap gap-2 justify-content-center"></div>
  </div>

  <!-- Command list -->
  <div id="commandList"></div>
  <div class="no-results text-center text-secondary py-5" id="noResults">
    <p class="fs-5">No commands match your search.</p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>

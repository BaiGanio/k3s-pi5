<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>k3s-pi5 Playground — DevOps Labs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Design tokens first — everything else reads from these variables -->
  <link rel="stylesheet" href="styles/index.css" />
  <!-- Reusable UI components: cards, code blocks, badges, command parts -->
  <link rel="stylesheet" href="styles/components.css" />
  <!-- Sidebar: layout, collapse, accordion groups, module buttons -->
  <link rel="stylesheet" href="styles/sidebar.css" />
  <!-- Main content area, module header, empty state -->
  <link rel="stylesheet" href="styles/playground.css" />
</head>

<body>

  <!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
  <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm" style="z-index: 300;">
    <div class="container-fluid px-3">
      <div class="d-flex align-items-center gap-2">
        <button id="sidebar-toggle" class="btn btn-sm btn-outline-secondary me-1" aria-label="Toggle sidebar"
          aria-expanded="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="2" />
            <line id="st-divider" x1="9" y1="4" x2="9" y2="20"
              style="transition:opacity .2s,transform .2s;transform-origin:9px 12px" />
            <polyline id="st-arrow" points="13,9 10,12 13,15"
              style="transition:transform .2s;transform-origin:11.5px 12px" />
          </svg>
        </button>
        <a class="navbar-brand fw-bold mb-0" href="index.html">
          <span style="font-family:'JetBrains Mono',monospace; font-size:0.95rem;">k3s-pi5</span>
        </a>
      </div>
      <div class="d-flex align-items-center gap-1">
        <a class="nav-link text-secondary px-2" href="index.html" style="font-size:0.88rem;">Commands</a>
        <span class="text-secondary" style="font-size:0.8rem;">|</span>
        <a class="nav-link text-white px-2 fw-semibold" href="playground.html" style="font-size:0.88rem;">🧪
          Playground</a>
      </div>
    </div>
  </nav>

  <!-- ── App shell ───────────────────────────────────────────────────────────── -->
  <div class="playground-shell">

    <!-- Sidebar — populated by playground.js -->
    <nav id="sidebar">
      <div id="sidebar-nav"></div>
    </nav>

    <!-- Main content -->
    <main id="playground-main">
      <div class="inner">

        <!-- Module header — shown after a module loads -->
        <div id="module-header" class="mb-5" style="display:none;">
          <h1 class="fw-bold fs-2 mb-1" id="module-title"></h1>
          <p class="text-secondary mb-4" id="module-subtitle"></p>
          <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search commands or concepts…" />
          <div id="filterControls" class="d-flex flex-wrap gap-2 justify-content-center"></div>
        </div>

        <!-- Command list (driven by app.js render()) -->
        <div id="commandList"></div>
        <div class="no-results text-center text-secondary py-5" id="noResults" style="display:none;">
          <p class="fs-5">No commands match your search.</p>
        </div>

        <!-- Welcome / empty state — populated by playground.js -->
        <div id="module-empty"></div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="lib/registry.js"></script>
  <script src="lib/playground.js"></script>
  <script src="lib/index.js"></script>
</body>

</html>

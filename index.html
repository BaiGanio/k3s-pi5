<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>k3s-pi5 Playground — DevOps Labs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
</head>

<body>

  <!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
  <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm" style="z-index: 300;">
    <div class="container-fluid px-3">
      <div class="d-flex align-items-center gap-2">
        <button id="sidebar-toggle" class="btn btn-sm btn-outline-secondary me-1" aria-label="Toggle sidebar">☰</button>
        <a class="navbar-brand fw-bold mb-0" href="index.html">
          <span style="font-family:'JetBrains Mono',monospace; font-size:0.95rem;">k3s-pi5</span>
        </a>
      </div>
      <div class="d-flex align-items-center gap-1">
        <a class="nav-link text-secondary px-2" href="index.html" style="font-size:0.88rem;">Commands</a>
        <span class="text-secondary" style="font-size:0.8rem;">|</span>
        <a class="nav-link text-white px-2 fw-semibold" href="playground.html" style="font-size:0.88rem;">🧪
          Playground</a>
      </div>
    </div>
  </nav>

  <!-- ── App shell ───────────────────────────────────────────────────────────── -->
  <div class="playground-shell">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div id="sidebar-nav">
        <!-- Populated by playground.js -->
      </div>
    </nav>

    <!-- Main content -->
    <main id="playground-main">
      <div class="inner">

        <!-- Module header — shown after a module loads -->
        <div id="module-header" class="text-center mb-5" style="display:none;">
          <h1 class="fw-bold fs-2 mb-1" id="module-title"></h1>
          <p class="text-secondary mb-4" id="module-subtitle"></p>
          <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search commands or concepts…" />
          <div id="filterControls" class="d-flex flex-wrap gap-2 justify-content-center"></div>
        </div>

        <!-- Command list (driven by app.js render()) -->
        <div id="commandList"></div>
        <div class="no-results text-center text-secondary py-5" id="noResults" style="display:none;">
          <p class="fs-5">No commands match your search.</p>
        </div>

        <!-- Empty state -->
        <div id="module-empty">
          <div class="empty-icon">🧪</div>
          <h4>Pick a module from the sidebar</h4>
          <p>Select a lab module on the left to explore its commands and explanations.</p>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="lib/registry.js"></script>
  <script src="lib/playground.js"></script>
  <script src="index.js"></script>
</body>

</html>

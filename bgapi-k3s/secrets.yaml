---
# Secrets for the BGAPI stack.
# The SA password is base64-encoded. Generate a new one with:
#   echo -n "YourStrong!Passw0rd" | base64
apiVersion: v1
kind: Secret
metadata:
  name: bgapi-secrets
  namespace: bgapi
  labels:
    app.kubernetes.io/part-of: bgapi
type: Opaque
data:
  # "YourStrong!Passw0rd" — change this if you use a different password
  # sa-password       → SQL Server (Azure SQL Edge) SA account
  # postgres-password → PostgreSQL 'postgres' superuser (ScroogeCorp context)
  sa-password: WW91clN0cm9uZyFQYXNzdzByZA==
  postgres-password: WW91clN0cm9uZyFQYXNzdzByZA==

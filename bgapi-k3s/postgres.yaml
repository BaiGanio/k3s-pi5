---
# PostgreSQL — home of the ScroogeCorp bounded context.
#
# The ScroogeCorp slice (FinancingRequest + IntakeDocument) lives in its own
# PostgreSQL database, separate from the SQL Server catalogs used by the legacy
# contexts — polyglot persistence. Postgres is native ARM64 and actively
# maintained, so it's the better long-term engine on a Pi than Azure SQL Edge.
#
# The API's ScroogeCorpDbContext applies its EF Core migrations on startup, so
# there is no seed Job here — Postgres comes up empty and the API creates the
# schema itself.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bgapi
  labels:
    app: postgres
    app.kubernetes.io/part-of: bgapi
spec:
  type: ClusterIP
  clusterIP: None          # Headless — StatefulSet pod gets stable DNS
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: bgapi
  labels:
    app: postgres
    app.kubernetes.io/part-of: bgapi
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bgapi-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: "scroogecorp"
            # Keep data in a subdirectory so the volume root stays clean.
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "scroogecorp"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "scroogecorp"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: bgapi
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

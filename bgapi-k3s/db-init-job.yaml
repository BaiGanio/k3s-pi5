---
# One-shot Job that seeds the Geography and TechCorp reference databases.
# Runs sqlcmd against the SQL Server service using the SQL scripts in Docs/sql/.
#
# This mirrors the docker-compose `mssql-init` container.
apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: bgapi
  labels:
    app: db-init
    app.kubernetes.io/part-of: bgapi
spec:
  ttlSecondsAfterFinished: 300   # Auto-cleanup after 5 min
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-init
    spec:
      restartPolicy: Never
      initContainers:
        # Wait for SQL Server to be ready before running the Job
        - name: wait-for-sqlserver
          image: mcr.microsoft.com/azure-sql-edge:latest
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for SQL Server to be ready..."
              for i in $(seq 1 30); do
                if /opt/mssql-tools18/bin/sqlcmd \
                  -S sqlserver.bgapi.svc.cluster.local \
                  -U sa -P "$SA_PASSWORD" -C \
                  -Q "SELECT 1" &>/dev/null; then
                  echo "SQL Server is ready."
                  exit 0
                fi
                echo "Attempt $i/30 — retrying in 5s..."
                sleep 5
              done
              echo "SQL Server did not become ready in time."
              exit 1
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bgapi-secrets
                  key: sa-password
      containers:
        - name: seed-databases
          image: mcr.microsoft.com/azure-sql-edge:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Seeding Geography database..."
              /opt/mssql-tools18/bin/sqlcmd \
                -S sqlserver.bgapi.svc.cluster.local \
                -U sa -P "$SA_PASSWORD" -C \
                -i /sql/geography.sql
              echo "Geography seeded."

              echo "Seeding TechCorp database..."
              /opt/mssql-tools18/bin/sqlcmd \
                -S sqlserver.bgapi.svc.cluster.local \
                -U sa -P "$SA_PASSWORD" -C \
                -i /sql/techcorp.sql
              echo "TechCorp seeded."

              echo "All databases seeded successfully."
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bgapi-secrets
                  key: sa-password
          volumeMounts:
            - name: sql-scripts
              mountPath: /sql
      volumes:
        - name: sql-scripts
          hostPath:
            # Path to the SQL scripts on the Pi.
            # Adjust if you cloned the repo elsewhere.
            path: /home/pi/BGAPI/Docs/sql
            type: Directory

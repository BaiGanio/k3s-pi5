---
# BGAPI .NET API — Deployment + ClusterIP Service.
#
# The API applies EF Core migrations on startup against the `bgapi-local`
# database, so no separate migration Job is needed.
apiVersion: v1
kind: Service
metadata:
  name: bgapi
  namespace: bgapi
  labels:
    app: bgapi
    app.kubernetes.io/part-of: bgapi
spec:
  type: ClusterIP
  ports:
    - port: 62010
      targetPort: 62010
      name: http
  selector:
    app: bgapi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bgapi
  namespace: bgapi
  labels:
    app: bgapi
    app.kubernetes.io/part-of: bgapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bgapi
  template:
    metadata:
      labels:
        app: bgapi
    spec:
      containers:
        - name: bgapi
          image: bgapi:local
          imagePullPolicy: Never    # Local image imported via `k3s ctr images import`
          ports:
            - containerPort: 62010
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:62010"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            # ---- Connection strings ----
            # All three databases point to the same SQL Server instance but
            # different catalogs — mirrors the docker-compose setup.
            - name: ConnectionStrings__dbconn
              value: "Server=sqlserver.bgapi.svc.cluster.local,1433;Initial Catalog=bgapi-local;TrustServerCertificate=True;Integrated Security=False;User ID=sa;Password=YourStrong!Passw0rd;"
            - name: ConnectionStrings__geography_dbconn
              value: "Server=sqlserver.bgapi.svc.cluster.local,1433;Initial Catalog=Geography;TrustServerCertificate=True;Integrated Security=False;User ID=sa;Password=YourStrong!Passw0rd;"
            - name: ConnectionStrings__techcorp_dbconn
              value: "Server=sqlserver.bgapi.svc.cluster.local,1433;Initial Catalog=TechCorp;TrustServerCertificate=True;Integrated Security=False;User ID=sa;Password=YourStrong!Passw0rd;"
            # ScroogeCorp bounded context — its own PostgreSQL database.
            # ScroogeCorpDbContext applies its EF Core migrations here on startup.
            - name: ConnectionStrings__scroogecorp_dbconn
              value: "Host=postgres.bgapi.svc.cluster.local;Port=5432;Database=scroogecorp;Username=postgres;Password=YourStrong!Passw0rd;"
            - name: ExternalDbProviders__geography_dbconn
              value: "mssql"
            - name: ExternalDbProviders__techcorp_dbconn
              value: "mssql"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /swagger/v1/swagger.json
              port: 62010
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /swagger/v1/swagger.json
              port: 62010
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5

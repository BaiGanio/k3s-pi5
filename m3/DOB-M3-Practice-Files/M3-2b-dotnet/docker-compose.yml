# docker-compose.yml — .NET 8 Web API + PostgreSQL
# .NET equivalent of the original M3-2b PHP+MySQL compose file.
version: '3.8'

services:
  db:
    build: ./db/
    environment:
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: weatherapp
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api/
    ports:
      - "${API_PORT}:8080"
    environment:
      ConnectionStrings__Default: "Host=db;Database=weatherapp;Username=postgres;Password=${DB_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pg-data:
